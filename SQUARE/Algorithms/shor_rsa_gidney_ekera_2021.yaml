# Abstract-circuit and problem-size assumptions for RSA factoring via Gidney & Ekerå 2021 construction.
document_id: shor_rsa_gidney_ekera_2021
schema_version: 1
primary_reference: >-
  Gidney, C. & Ekerå, M. How to factor 2048 bit RSA integers in 8 hours using 20 million noisy qubits.
  Quantum 5, 433 (2021).
doi: "10.22331/q-2021-04-15-433"
arxiv: "1905.09749"
date_issued: "2021-04-15"
notes: >
  Uses Ekerå–Håstad RSA factoring (short discrete log). Exponent-register size scales as ne ≈ 1.5 n
