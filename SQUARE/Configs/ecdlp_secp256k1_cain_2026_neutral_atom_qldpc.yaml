# ECDLP secp256k1 (256-bit) — same logical envelope as Babbush et al. (2026) low-Toffoli variant, but physical stack
# from Cain et al. (2026): neutral-atom modality + quantum LDPC QEC profile (arXiv:2603.28627).
schema_version: 1
scenario: ecdlp_secp256k1_cain_2026_neutral_atom_qldpc
description: >-
  Logical resources: ≤1450 logical qubits and ≤70M Toffoli gates (low_toffoli_variant) from
  ecdlp_secp256k1_babbush_et_al_2026 algorithm YAML. Physical layer uses neutral_atom_cain_et_al_2026 and
  qldpc_cain_et_al_2026; numeric proxies are documented in those files (refine from full paper).

target:
  problem: ecdlp_secp256k1_256_bit
  curve_bit_length: 256
  ecdlp_variant: low_toffoli_variant

qec:
  distance_policy: heuristic_union_bound
  logical_error_budget: 0.1

paths:
  modality: Assumptions/Modalities/neutral_atom_cain_et_al_2026.yaml
  qec_code: Assumptions/QEC_Codes/qldpc_cain_et_al_2026.yaml
  magic: Assumptions/MagicStateProduction/ccz_factory_gidney_ekera_2021.yaml
  magic_aux: Assumptions/MagicStateProduction/t_factory_fallback_gidney_ekera_2021.yaml
  algorithm: Algorithms/ecdlp_secp256k1_babbush_et_al_2026.yaml
