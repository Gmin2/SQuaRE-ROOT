# ECDLP low-Toffoli stack with illustrative (non-identity) QCVV + QEM — demonstrates VER and mitigated ceiling math.
# Baseline without these paths: ``ecdlp_secp256k1_babbush_2026_low_toffoli.yaml``.
schema_version: 1
scenario: ecdlp_secp256k1_babbush_2026_low_toffoli_illustrative_qcvv_qem
description: >-
  Same composition as the baseline Babbush ECDLP scenario, but QCVV σ=1.15 and QEM stub (s=0.85, Γ=4)
  for sensitivity demos. Numbers are illustrative, not paper-pinned.

target:
  problem: ecdlp_secp256k1_256_bit
  curve_bit_length: 256
  ecdlp_variant: low_toffoli_variant

qec:
  distance_policy: heuristic_union_bound
  logical_error_budget: 0.1

paths:
  modality: Assumptions/Modalities/superconducting_babbush_et_al_2026.yaml
  qec_code: Assumptions/QEC_Codes/surface_gidney_ekera_2021.yaml
  magic: Assumptions/MagicStateProduction/ccz_factory_gidney_ekera_2021.yaml
  magic_aux: Assumptions/MagicStateProduction/t_factory_fallback_gidney_ekera_2021.yaml
  algorithm: Algorithms/ecdlp_secp256k1_babbush_et_al_2026.yaml
  qcvv: Assumptions/QCVV/benchmarking_operational_error_sigma_1_15.yaml
  qem: Assumptions/QEM/example_zne_style_stub.yaml
