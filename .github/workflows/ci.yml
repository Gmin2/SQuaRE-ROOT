name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SQUARE
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Pytest
        run: python -m pytest -q

      - name: Monte Carlo smoke (square-mc)
        run: |
          square-mc Configs/monte_carlo_study_ecdlp_example.yaml --samples 3 --seed 1 \
            --output-csv /tmp/mc.csv --summary-json /tmp/mc.json \
            --root "${{ github.workspace }}/SQUARE"
          test -s /tmp/mc.csv
          test -s /tmp/mc.json
